name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node: ['20.19', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests (headless Chrome)
        run: npm test -- --watch=false --browsers=ChromeHeadlessCI --progress=false

      - name: Production build (browser + server)
        run: npm run build -- --configuration=production

      - name: Upload browser bundle
        if: matrix.node == '22'
        uses: actions/upload-artifact@v4
        with:
          name: dist-ng-package-compat
          path: dist/
          if-no-files-found: error
          retention-days: 7

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: ng-package-compat:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
