# Optional static-only nginx config for serving the CSR build.
# Use this when you do NOT want the SSR Node server (simpler, cheaper).

worker_processes  auto;
events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript application/xml;

  server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Long-cache hashed assets
    location ~* \.(?:js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
      expires 1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
      access_log off;
    }

    # Service worker must NOT be cached by browsers
    location = /ngsw-worker.js {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /ngsw.json {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header X-Frame-Options DENY;
  }
}
